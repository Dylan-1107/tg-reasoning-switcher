<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Reasoning Switcher</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg1: rgba(255,255,255,.08);
      --bg2: rgba(255,255,255,.04);
      --stroke: rgba(255,255,255,.16);
      --text: #f5f7ff;
      --muted: rgba(245,247,255,.68);
      --shadow: 0 18px 60px rgba(0,0,0,.28);
      --low: rgba(94, 234, 212, .22);
      --high: rgba(96, 165, 250, .22);
      --max: rgba(244, 114, 182, .22);
      --chip: rgba(255,255,255,.06);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, "SF Pro Display", "PingFang SC", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(96,165,250,.22), transparent 32%),
        radial-gradient(circle at 100% 0%, rgba(244,114,182,.16), transparent 26%),
        radial-gradient(circle at 50% 100%, rgba(94,234,212,.12), transparent 28%),
        #0b1020;
      padding: 18px;
    }

    .shell {
      max-width: 760px;
      margin: 0 auto;
    }

    .glass {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--stroke);
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      box-shadow: var(--shadow);
    }

    .hero {
      border-radius: 28px;
      padding: 22px;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: -1px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.14), transparent 28%, transparent 72%, rgba(255,255,255,.08)),
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 22%);
      pointer-events: none;
      mask: linear-gradient(#000, #000) content-box, linear-gradient(#000, #000);
      -webkit-mask: linear-gradient(#000, #000) content-box, linear-gradient(#000, #000);
      mask-composite: exclude;
      -webkit-mask-composite: xor;
      padding: 1px;
      border-radius: 28px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 7vw, 42px);
      line-height: 1.05;
      letter-spacing: -.04em;
    }

    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 18px;
    }

    .mode-btn {
      position: relative;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 22px;
      padding: 18px 16px;
      text-align: left;
      color: var(--text);
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 12px 30px rgba(0,0,0,.12);
      min-height: 132px;
    }

    .mode-btn::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,.10), transparent 34%);
      opacity: .85;
      pointer-events: none;
    }

    .mode-btn:hover,
    .mode-btn:active {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,.22);
    }

    .mode-btn.low { background: linear-gradient(180deg, var(--low), rgba(255,255,255,.03)); }
    .mode-btn.high { background: linear-gradient(180deg, var(--high), rgba(255,255,255,.03)); }
    .mode-btn.max { background: linear-gradient(180deg, var(--max), rgba(255,255,255,.03)); }

    .mode-name {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.03em;
      margin-bottom: 8px;
    }

    .mode-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .chip-btn {
      border: 1px solid rgba(255,255,255,.12);
      background: var(--chip);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .status {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      min-height: 54px;
    }

    .footer {
      margin-top: 16px;
      color: rgba(245,247,255,.55);
      font-size: 12px;
      line-height: 1.7;
    }

    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
      .hero { border-radius: 24px; padding: 18px; }
      .mode-btn { min-height: 112px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="glass hero">
      <div class="eyebrow">Telegram Mini App · Reasoning</div>
      <h1>推理档位切换</h1>
      <p class="sub">点一下就把命令发回当前 Telegram 聊天。主按钮保持毛玻璃 / 透明感；Max 档默认发送 <code>/think xhigh</code>。</p>

      <div class="grid">
        <button class="mode-btn low" data-command="/think low">
          <div class="mode-name">Low</div>
          <div class="mode-desc">快速、轻推理。适合普通对话、小改动、查状态。</div>
        </button>

        <button class="mode-btn high" data-command="/think high">
          <div class="mode-name">High</div>
          <div class="mode-desc">中高强度分析。适合排障、多步骤实现、结构化思考。</div>
        </button>

        <button class="mode-btn max" data-command="/think xhigh">
          <div class="mode-name">Max</div>
          <div class="mode-desc">最高档。适合关键决策、重度分析、复杂实现。需兼容模型支持。</div>
        </button>
      </div>

      <div class="chips">
        <button class="chip-btn" data-command="/model GPT">先切到 GPT</button>
        <button class="chip-btn" data-command="/status">查看当前状态</button>
        <button class="chip-btn" data-command="/think off">关闭推理</button>
      </div>

      <div class="status" id="status">等待发送…</div>
      <div class="footer">在 Telegram WebApp 环境里会直接发送到当前聊天；如果你在普通浏览器打开，会自动改成复制命令。</div>
    </section>
  </main>

  <script>
    const statusEl = document.getElementById('status');
    const tg = window.Telegram && window.Telegram.WebApp;

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function closeMiniApp() {
      if (tg && typeof tg.close === 'function') {
        tg.close();
        return true;
      }
      return false;
    }

    function goBack() {
      if (window.history.length > 1) {
        window.history.back();
        return true;
      }
      return closeMiniApp();
    }

    function setupTelegramBackButton() {
      if (!tg || !tg.BackButton) return;
      try {
        tg.BackButton.show();
        tg.BackButton.onClick(() => {
          goBack();
        });
      } catch {
        // ignore Telegram API setup failures
      }
    }

    async function fallbackCopy(command) {
      try {
        await navigator.clipboard.writeText(command);
        setStatus(`当前不在 Telegram Mini App 环境，已复制：${command}`);
      } catch {
        setStatus(`无法自动发送，请手动复制：${command}`);
      }
    }

    function sendCommand(command) {
      setStatus(`正在发送：${command}`);
      if (tg && typeof tg.sendData === 'function') {
        tg.sendData(command);
        setStatus(`已发送：${command}`);
        setTimeout(() => {
          closeMiniApp();
        }, 180);
        return;
      }
      fallbackCopy(command);
    }

    document.querySelectorAll('[data-command]').forEach((btn) => {
      btn.addEventListener('click', () => sendCommand(btn.dataset.command));
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        goBack();
      }
    });

    if (tg) {
      tg.ready();
      tg.expand();
      setupTelegramBackButton();
      setStatus('Mini App 已连接 Telegram，可以直接发送命令；左上角返回可直接退出。');
    }
  </script>
</body>
</html>
